name: Charmster
packages:
  Supabase:
    url: 'https://github.com/supabase/supabase-swift'
    from: '2.0.0'
  Superwall:
    url: 'https://github.com/superwall/Superwall-iOS'
    from: '4.0.0'
targets:
  Charmster:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Charmster
    dependencies:
          - package: Supabase
            product: Supabase
          - package: Superwall
            product: SuperwallKit
    settings:
      base:
        PRODUCT_NAME: Charmster
        PRODUCT_BUNDLE_IDENTIFIER: app.10x.charmster
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: 'Charmster'
        INFOPLIST_KEY_CFBundleName: 'Charmster'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_NSCameraUsageDescription: 'This app uses the camera to capture photos and video.'
        INFOPLIST_KEY_NSMicrophoneUsageDescription: 'This app uses the microphone to record audio.'
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 'This app accesses your photo library to read photos.'
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ALWAYS_SEARCH_USER_PATHS: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
      configs:
        Debug:
          ONLY_ACTIVE_ARCH: YES
    scheme:
      environmentVariables:
        'SUPABASE_ANON_KEY': 'sb_publishable_PugmXyqfYNd9-owgqH9s5w_hVbXBIcY'
        'SUPABASE_PUBLISHABLE_KEY': 'sb_publishable_PugmXyqfYNd9-owgqH9s5w_hVbXBIcY'
        'SUPABASE_URL': 'https://uvjtrhvhldeeslgnvhyd.supabase.co'
        'SUPERWALL_PUBLIC_API_KEY': 'pk_UG-RlIJhXloS9444PJtJJ'